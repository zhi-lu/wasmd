syntax = "proto3";

package agent;

import "agent/tx.proto";
import "gogoproto/gogo.proto";

option go_package = "github.com/CosmWasm/wasmd/x/agent/types";

option (gogoproto.goproto_getters_all) = false;

// GenesisState defines the agent module's genesis state.
message GenesisState {
  repeated Model models = 1 [(gogoproto.nullable) = false];
  repeated Agent agents = 2 [(gogoproto.nullable) = false];
  repeated Task  tasks  = 3 [(gogoproto.nullable) = false];
  uint64 next_agent_id  = 4;
  uint64 next_task_id   = 5;
}
